---
- name: Configuration commune toutes VM
  hosts: all
  become: true

  tasks:

    - name: Mise a jour des paquets
      apt:
        update_cache: yes
        upgrade: dist
        cache_valid_time: 3600

    - name: Installation outils essentiels
      apt:
        name:
          - curl
          - wget
          - git
          - vim
          - htop
          - net-tools
          - ufw
          - fail2ban
          - auditd
          - unzip
          - ca-certificates
          - gnupg
          - python3
          - python3-pip
        state: present

    - name: Sudo sans mot de passe pour debian
      lineinfile:
        path: /etc/sudoers.d/debian
        line: "debian ALL=(ALL) NOPASSWD:ALL"
        create: yes
        mode: '0440'

    - name: Durcissement SSH - desactiver acces root
      lineinfile:
        path: /etc/ssh/sshd_config
        regexp: "^PermitRootLogin"
        line: "PermitRootLogin no"
      notify: restart ssh

    - name: Durcissement SSH - desactiver auth par mot de passe
      lineinfile:
        path: /etc/ssh/sshd_config
        regexp: "^PasswordAuthentication"
        line: "PasswordAuthentication no"
      notify: restart ssh

    - name: Activer auditd
      service:
        name: auditd
        state: started
        enabled: yes

    - name: Activer fail2ban
      service:
        name: fail2ban
        state: started
        enabled: yes

    - name: Installer node_exporter pour supervision
      block:
        - name: Telecharger node_exporter
          get_url:
            url: "https://github.com/prometheus/node_exporter/releases/download/v1.8.1/node_exporter-1.8.1.linux-amd64.tar.gz"
            dest: /tmp/node_exporter.tar.gz

        - name: Extraire node_exporter
          unarchive:
            src: /tmp/node_exporter.tar.gz
            dest: /tmp/
            remote_src: yes

        - name: Copier le binaire
          copy:
            src: /tmp/node_exporter-1.8.1.linux-amd64/node_exporter
            dest: /usr/local/bin/node_exporter
            mode: '0755'
            remote_src: yes

        - name: Creer service systemd node_exporter
          copy:
            dest: /etc/systemd/system/node_exporter.service
            content: |
              [Unit]
              Description=Node Exporter
              After=network.target

              [Service]
              User=nobody
              ExecStart=/usr/local/bin/node_exporter
              Restart=always

              [Install]
              WantedBy=multi-user.target

        - name: Activer et demarrer node_exporter
          systemd:
            name: node_exporter
            enabled: yes
            state: started
            daemon_reload: yes

  handlers:
    - name: restart ssh
      service:
        name: ssh
        state: restarted
