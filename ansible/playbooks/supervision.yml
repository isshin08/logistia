---
- name: Configuration supervision - Prometheus + Grafana + Loki
  hosts: supervision
  become: true

  tasks:

    - name: Creer utilisateur prometheus
      user:
        name: prometheus
        shell: /bin/false
        system: yes

    - name: Telecharger Prometheus
      get_url:
        url: "https://github.com/prometheus/prometheus/releases/download/v2.52.0/prometheus-2.52.0.linux-amd64.tar.gz"
        dest: /tmp/prometheus.tar.gz

    - name: Extraire Prometheus
      unarchive:
        src: /tmp/prometheus.tar.gz
        dest: /tmp/
        remote_src: yes

    - name: Installer binaires Prometheus
      copy:
        src: "/tmp/prometheus-2.52.0.linux-amd64/{{ item }}"
        dest: "/usr/local/bin/{{ item }}"
        mode: '0755'
        remote_src: yes
      loop:
        - prometheus
        - promtool

    - name: Creer dossiers Prometheus
      file:
        path: "{{ item }}"
        state: directory
        owner: prometheus
        group: prometheus
      loop:
        - /etc/prometheus
        - /var/lib/prometheus

    - name: Configurer Prometheus
      copy:
        dest: /etc/prometheus/prometheus.yml
        owner: prometheus
        content: |
          global:
            scrape_interval: 15s

          scrape_configs:
            - job_name: 'proxmox'
              static_configs:
                - targets: ['192.168.1.250:9100']

            - job_name: 'db-server'
              static_configs:
                - targets: ['192.168.20.10:9100']

            - job_name: 'web-server'
              static_configs:
                - targets: ['192.168.20.20:9100']

            - job_name: 'ia-server'
              static_configs:
                - targets: ['192.168.20.30:9100']

            - job_name: 'soc-server'
              static_configs:
                - targets: ['192.168.30.10:9100']

            - job_name: 'runner-server'
              static_configs:
                - targets: ['192.168.50.10:9100']

    - name: Creer service systemd Prometheus
      copy:
        dest: /etc/systemd/system/prometheus.service
        content: |
          [Unit]
          Description=Prometheus
          After=network.target

          [Service]
          User=prometheus
          ExecStart=/usr/local/bin/prometheus \
            --config.file=/etc/prometheus/prometheus.yml \
            --storage.tsdb.path=/var/lib/prometheus
          Restart=always

          [Install]
          WantedBy=multi-user.target

    - name: Demarrer Prometheus
      systemd:
        name: prometheus
        enabled: yes
        state: started
        daemon_reload: yes

    - name: Telecharger Loki
      get_url:
        url: "https://github.com/grafana/loki/releases/download/v3.0.0/loki-linux-amd64.zip"
        dest: /tmp/loki.zip

    - name: Extraire Loki
      unarchive:
        src: /tmp/loki.zip
        dest: /usr/local/bin/
        remote_src: yes

    - name: Renommer binaire Loki
      command: mv /usr/local/bin/loki-linux-amd64 /usr/local/bin/loki
      args:
        creates: /usr/local/bin/loki

    - name: Rendre Loki executable
      file:
        path: /usr/local/bin/loki
        mode: '0755'

    - name: Creer dossiers Loki
      file:
        path: "{{ item }}"
        state: directory
      loop:
        - /etc/loki
        - /var/lib/loki/index
        - /var/lib/loki/cache
        - /var/lib/loki/chunks
        - /var/lib/loki/compactor

    - name: Configurer Loki
      copy:
        dest: /etc/loki/loki.yml
        content: |
          auth_enabled: false

          server:
            http_listen_port: 3100

          common:
            path_prefix: /var/lib/loki

          ingester:
            lifecycler:
              ring:
                kvstore:
                  store: inmemory
                replication_factor: 1

          schema_config:
            configs:
              - from: 2024-01-01
                store: tsdb
                object_store: filesystem
                schema: v13
                index:
                  prefix: index_
                  period: 24h

          storage_config:
            tsdb_shipper:
              active_index_directory: /var/lib/loki/index
              cache_location: /var/lib/loki/cache
            filesystem:
              directory: /var/lib/loki/chunks

          compactor:
            working_directory: /var/lib/loki/compactor

          limits_config:
            allow_structured_metadata: false
            reject_old_samples: true
            reject_old_samples_max_age: 168h

    - name: Creer service systemd Loki
      copy:
        dest: /etc/systemd/system/loki.service
        content: |
          [Unit]
          Description=Loki Log Aggregation
          After=network.target

          [Service]
          ExecStart=/usr/local/bin/loki -config.file=/etc/loki/loki.yml
          Restart=always

          [Install]
          WantedBy=multi-user.target

    - name: Demarrer Loki
      systemd:
        name: loki
        enabled: yes
        state: started
        daemon_reload: yes

    - name: Supprimer ancienne cle GPG Grafana si presente
      file:
        path: /etc/apt/keyrings/grafana.gpg
        state: absent

    - name: Importer cle GPG Grafana correctement
      shell: |
        curl -fsSL https://apt.grafana.com/gpg.key | gpg --dearmor -o /etc/apt/keyrings/grafana.gpg
      args:
        creates: /etc/apt/keyrings/grafana.gpg

    - name: Ajouter depot Grafana
      copy:
        dest: /etc/apt/sources.list.d/grafana.list
        content: |
          deb [signed-by=/etc/apt/keyrings/grafana.gpg] https://apt.grafana.com stable main

    - name: Installer Grafana
      apt:
        name: grafana
        state: present
        update_cache: yes

    - name: Demarrer Grafana
      systemd:
        name: grafana-server
        enabled: yes
        state: started

- name: Installer Promtail sur toutes les VM
  hosts: all
  become: true

  tasks:

    - name: Telecharger Promtail
      get_url:
        url: "https://github.com/grafana/loki/releases/download/v3.0.0/promtail-linux-amd64.zip"
        dest: /tmp/promtail.zip

    - name: Extraire Promtail
      unarchive:
        src: /tmp/promtail.zip
        dest: /usr/local/bin/
        remote_src: yes

    - name: Renommer binaire Promtail
      command: mv /usr/local/bin/promtail-linux-amd64 /usr/local/bin/promtail
      args:
        creates: /usr/local/bin/promtail

    - name: Rendre Promtail executable
      file:
        path: /usr/local/bin/promtail
        mode: '0755'

    - name: Creer dossier config Promtail
      file:
        path: /etc/promtail
        state: directory

    - name: Configurer Promtail
      copy:
        dest: /etc/promtail/promtail.yml
        content: |
          server:
            http_listen_port: 9080
            grpc_listen_port: {% if ansible_hostname == 'soc-server' %}9096{% else %}9095{% endif %}

          positions:
            filename: /var/lib/promtail/positions.yaml

          clients:
            - url: http://192.168.30.10:3100/loki/api/v1/push

          scrape_configs:
            - job_name: system
              static_configs:
                - targets: ['localhost']
                  labels:
                    job: syslog
                    host: "{{ ansible_hostname }}"
                    __path__: /var/log/syslog

            - job_name: auth
              static_configs:
                - targets: ['localhost']
                  labels:
                    job: auth
                    host: "{{ ansible_hostname }}"
                    __path__: /var/log/auth.log

    - name: Creer dossier positions Promtail
      file:
        path: /var/lib/promtail
        state: directory

    - name: Creer service systemd Promtail
      copy:
        dest: /etc/systemd/system/promtail.service
        content: |
          [Unit]
          Description=Promtail Log Shipper
          After=network.target

          [Service]
          ExecStart=/usr/local/bin/promtail -config.file=/etc/promtail/promtail.yml
          Restart=always

          [Install]
          WantedBy=multi-user.target

    - name: Demarrer Promtail
      systemd:
        name: promtail
        enabled: yes
        state: started
        daemon_reload: yes
