name: CI - Validation

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint-terraform:
    name: Lint Terraform
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Terraform fmt check
        working-directory: terraform
        run: terraform fmt -check -recursive

      - name: Terraform validate
        working-directory: terraform
        run: |
          terraform init -backend=false
          terraform validate

  lint-ansible:
    name: Lint Ansible
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Installer ansible-lint
        run: pip3 install ansible-lint --break-system-packages

      - name: Ansible lint
        working-directory: ansible
        run: ansible-lint playbooks/ --exclude playbooks/soc.yml || true

  test-connectivity:
    name: Test connectivite VM
    runs-on: self-hosted

    steps:
      - name: Ping toutes les VM
        run: |
          for ip in 192.168.20.10 192.168.50.10 192.168.30.10 192.168.20.20 192.168.20.30; do
            ping -c 1 -W 2 $ip && echo "✅ $ip OK" || echo "❌ $ip KO"
          done

      - name: Test API web-server
        run: |
          curl -sf http://192.168.20.20/ && echo "✅ web-server OK" || echo "❌ web-server KO"
